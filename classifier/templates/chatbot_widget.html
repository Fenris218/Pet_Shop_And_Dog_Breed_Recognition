<!-- Chatbot Widget -->
<style>
  /* Chatbot Container */
  .chatbot-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    font-family: 'Inter', 'Segoe UI', sans-serif;
  }

  /* Toggle Button */
  .chatbot-toggle {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(217, 119, 6, 0.4);
    transition: all 0.3s ease;
  }

  .chatbot-toggle:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 25px rgba(217, 119, 6, 0.5);
  }

  .chatbot-toggle i {
    color: white;
    font-size: 24px;
    transition: transform 0.3s ease;
  }

  .chatbot-toggle.open i {
    transform: rotate(90deg);
  }

  /* Chat Window */
  .chatbot-window {
    position: absolute;
    bottom: 75px;
    right: 0;
    width: 380px;
    max-width: calc(100vw - 48px);
    height: 520px;
    max-height: calc(100vh - 150px);
    background: white;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
    display: none;
    flex-direction: column;
    overflow: hidden;
    animation: slideUp 0.3s ease;
  }

  .chatbot-window.show {
    display: flex;
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Header */
  .chatbot-header {
    background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
    color: white;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .chatbot-header-avatar {
    width: 40px;
    height: 40px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .chatbot-header-info h3 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
  }

  .chatbot-header-info p {
    margin: 2px 0 0;
    font-size: 12px;
    opacity: 0.9;
  }

  .chatbot-header-close {
    margin-left: auto;
    background: rgba(255, 255, 255, 0.2);
    border: none;
    color: white;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .chatbot-header-close:hover {
    background: rgba(255, 255, 255, 0.3);
  }

  /* Messages Area */
  .chatbot-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: #f8fafc;
  }

  .chatbot-message {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .chatbot-message.bot {
    align-self: flex-start;
    background: white;
    color: #334155;
    border: 1px solid #e2e8f0;
    border-bottom-left-radius: 4px;
  }

  .chatbot-message.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .chatbot-message.typing {
    padding: 16px 20px;
  }

  .typing-indicator {
    display: flex;
    gap: 4px;
  }

  .typing-indicator span {
    width: 8px;
    height: 8px;
    background: #94a3b8;
    border-radius: 50%;
    animation: typing 1.4s infinite ease-in-out;
  }

  .typing-indicator span:nth-child(2) {
    animation-delay: 0.2s;
  }

  .typing-indicator span:nth-child(3) {
    animation-delay: 0.4s;
  }

  @keyframes typing {
    0%, 60%, 100% {
      transform: translateY(0);
    }
    30% {
      transform: translateY(-8px);
    }
  }

  /* Quick Actions */
  .chatbot-quick-actions {
    padding: 8px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    background: #f8fafc;
    border-top: 1px solid #e2e8f0;
  }

  .quick-action-btn {
    padding: 6px 12px;
    background: white;
    border: 1px solid #e2e8f0;
    border-radius: 20px;
    font-size: 12px;
    color: #475569;
    cursor: pointer;
    transition: all 0.2s;
  }

  .quick-action-btn:hover {
    background: #d97706;
    color: white;
    border-color: #d97706;
  }

  /* Input Area */
  .chatbot-input-area {
    padding: 12px 16px;
    background: white;
    border-top: 1px solid #e2e8f0;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .chatbot-input {
    flex: 1;
    border: 1px solid #e2e8f0;
    border-radius: 24px;
    padding: 10px 16px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .chatbot-input:focus {
    border-color: #d97706;
  }

  .chatbot-input::placeholder {
    color: #94a3b8;
  }

  .chatbot-send {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #d97706;
    border: none;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .chatbot-send:hover {
    background: #b45309;
    transform: scale(1.05);
  }

  .chatbot-send:disabled {
    background: #cbd5e1;
    cursor: not-allowed;
    transform: none;
  }

  /* Mobile Responsive */
  @media (max-width: 480px) {
    .chatbot-container {
      bottom: 16px;
      right: 16px;
    }

    .chatbot-window {
      width: calc(100vw - 32px);
      height: calc(100vh - 120px);
      bottom: 70px;
      right: -8px;
    }

    .chatbot-toggle {
      width: 54px;
      height: 54px;
    }
  }
</style>

<div class="chatbot-container" id="chatbot">
  <!-- Toggle Button -->
  <button class="chatbot-toggle" id="chatbot-toggle" aria-label="Mở chatbot">
    <i class="fa-solid fa-comments"></i>
  </button>

  <!-- Chat Window -->
  <div class="chatbot-window" id="chatbot-window">
    <!-- Header -->
    <div class="chatbot-header">
      <div class="chatbot-header-avatar">
        <i class="fa-solid fa-dog"></i>
      </div>
      <div class="chatbot-header-info">
        <h3>Trợ Lý DogShop</h3>
        <p> Sẵn sàng hỗ trợ bạn</p>
      </div>
      <button class="chatbot-header-close" id="chatbot-close" aria-label="Đóng chatbot">
        <i class="fa-solid fa-times"></i>
      </button>
    </div>

    <!-- Messages -->
    <div class="chatbot-messages" id="chatbot-messages">
      <div class="chatbot-message bot">
         Xin chào! Tôi là trợ lý ảo của DogShop.

Tôi có thể giúp bạn:
• Xem danh sách chó đang bán
• Tìm hiểu về các giống chó
• Tra cứu giá cả
• Xem thông tin chi tiết từng con

Hãy hỏi tôi bất cứ điều gì!
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="chatbot-quick-actions">
      <button class="quick-action-btn" data-message="Chó nào đang bán?"> Xem chó bán</button>
      <button class="quick-action-btn" data-message="Danh sách các giống chó"> Giống chó</button>
      <button class="quick-action-btn" data-message="Giá chó"> Giá cả</button>
      <button class="quick-action-btn" data-message="help">❓ Trợ giúp</button>
    </div>

    <!-- Input -->
    <div class="chatbot-input-area">
      <input 
        type="text" 
        class="chatbot-input" 
        id="chatbot-input" 
        placeholder="Nhập tin nhắn..."
        autocomplete="off"
      />
      <button class="chatbot-send" id="chatbot-send" aria-label="Gửi tin nhắn">
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </div>
  </div>
</div>

<script>
(function() {
  // Elements
  const container = document.getElementById('chatbot');
  const toggleBtn = document.getElementById('chatbot-toggle');
  const closeBtn = document.getElementById('chatbot-close');
  const chatWindow = document.getElementById('chatbot-window');
  const messagesContainer = document.getElementById('chatbot-messages');
  const input = document.getElementById('chatbot-input');
  const sendBtn = document.getElementById('chatbot-send');
  const quickActions = document.querySelectorAll('.quick-action-btn');

  // State
  let isOpen = false;
  let isLoading = false;

  // Toggle chat window
  function toggleChat() {
    isOpen = !isOpen;
    chatWindow.classList.toggle('show', isOpen);
    toggleBtn.classList.toggle('open', isOpen);
    
    if (isOpen) {
      input.focus();
    }
  }

  // Add message to chat
  function addMessage(text, isUser = false) {
    const messageDiv = document.createElement('div');
    messageDiv.className = `chatbot-message ${isUser ? 'user' : 'bot'}`;
    messageDiv.textContent = text;
    messagesContainer.appendChild(messageDiv);
    scrollToBottom();
  }

  // Show typing indicator
  function showTyping() {
    const typingDiv = document.createElement('div');
    typingDiv.className = 'chatbot-message bot typing';
    typingDiv.id = 'typing-indicator';
    typingDiv.innerHTML = `
      <div class="typing-indicator">
        <span></span>
        <span></span>
        <span></span>
      </div>
    `;
    messagesContainer.appendChild(typingDiv);
    scrollToBottom();
  }

  // Hide typing indicator
  function hideTyping() {
    const typingDiv = document.getElementById('typing-indicator');
    if (typingDiv) {
      typingDiv.remove();
    }
  }

  // Scroll to bottom of messages
  function scrollToBottom() {
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }

  // Send message to API
  async function sendMessage(message) {
    if (!message.trim() || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    input.value = '';

    // Add user message
    addMessage(message, true);

    // Show typing
    showTyping();

    try {
      const response = await fetch('/api/chatbot/message/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ message: message })
      });

      const data = await response.json();

      hideTyping();

      if (data.success) {
        addMessage(data.response);
      } else {
        addMessage(' Có lỗi xảy ra. Vui lòng thử lại!');
      }
    } catch (error) {
      hideTyping();
      addMessage(' Không thể kết nối. Vui lòng kiểm tra kết nối mạng!');
      console.error('Chatbot error:', error);
    }

    isLoading = false;
    sendBtn.disabled = false;
    input.focus();
  }

  // Event Listeners
  toggleBtn.addEventListener('click', toggleChat);
  closeBtn.addEventListener('click', toggleChat);

  sendBtn.addEventListener('click', () => {
    sendMessage(input.value);
  });

  input.addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(input.value);
    }
  });

  // Quick actions
  quickActions.forEach(btn => {
    btn.addEventListener('click', () => {
      const message = btn.getAttribute('data-message');
      if (message) {
        sendMessage(message);
      }
    });
  });

  // Close on escape key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && isOpen) {
      toggleChat();
    }
  });

  // Close when clicking outside (optional)
  document.addEventListener('click', (e) => {
    if (isOpen && !container.contains(e.target)) {
      // toggleChat(); // Uncomment to enable click-outside-to-close
    }
  });
})();
</script>
